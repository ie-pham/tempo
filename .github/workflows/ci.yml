name: CI
on:
  pull_request:
# Requiring certain checks for PRs to be merge-able in Github, forces for those checks to be *always* run.
# Even if the changes do not require them (i.e. the paths indicated below). That's why `paths-ignore` is commented out.
#
#    paths-ignore:
#      - 'docs/**'
#      - 'example/**'
#      - 'tools/**'

concurrency:
  # Cancel any running workflow for the same branch when new commits are pushed.
  # We group both by ref_name (available when CI is triggered by a push to a branch/tag)
  # and head_ref (available when CI is triggered by a PR).
  group: "${{ github.ref_name }}-${{ github.head_ref }}"
  cancel-in-progress: true

permissions: {}

jobs:
  integration-tests:
    name: Run integration tests
    runs-on: ubuntu-24.04
    permissions:
      contents: read        # checkout
      pull-requests: write  # traceguard-analyze posts a PR comment
    strategy:
      fail-fast: false
      matrix:
        test-target:
          [
            test-e2e-api,
          ]
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Fetch tags
        run: git fetch --prune --unshallow --tags
      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: 'go.mod'
      - name: Install Grafana Alloy
        run: |
          wget -q -O - https://apt.grafana.com/gpg.key | gpg --dearmor | sudo tee /etc/apt/keyrings/grafana.gpg > /dev/null
          echo "deb [signed-by=/etc/apt/keyrings/grafana.gpg] https://apt.grafana.com stable main" | sudo tee /etc/apt/sources.list.d/grafana.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y alloy
      - name: Start Grafana Alloy
        run: |
          OTEL_EXPORTER_OTLP_ENDPOINT="${{ secrets.OTEL_ENDPOINT }}" \
          GRAFANA_USER="${{ secrets.GRAFANA_USER }}" \
          GRAFANA_SERVICE_TOKEN="${{ secrets.GRAFANA_SERVICE_TOKEN }}" \
            alloy run tests/traceguard/config.alloy &
          deadline=$(( $(date +%s) + 30 ))
          until curl -sf http://localhost:12345/-/ready >/dev/null 2>&1 || [ "$(date +%s)" -ge "$deadline" ]; do
            sleep 1
          done
          curl -sf http://localhost:12345/-/ready >/dev/null 2>&1 && echo "Alloy ready" || echo "WARNING: Alloy did not respond on :12345 — traces may not be forwarded"
      - name: Run Tests
        run: make ${{ matrix.test-target }}
        env:
          # Tempo containers push traces to local Alloy (no auth needed).
          # Alloy forwards them to Grafana Cloud using OTEL_ENDPOINT + GRAFANA_USER
          # + GRAFANA_SERVICE_TOKEN secrets. Empty secrets on fork PRs are harmless —
          # Alloy simply won't connect and traces are dropped silently.
          #
          # The e2e framework creates a custom Docker network with a random subnet, so
          # "localhost" and the default-route gateway are unreachable from inside containers.
          # We pin the subnet via DOCKER_NETWORK_CREATE_EXTRA_ARGS (supported by
          # vendor/github.com/grafana/e2e/scenario.go) so the gateway is always 172.20.0.1.
          DOCKER_NETWORK_CREATE_EXTRA_ARGS: "--subnet=172.20.0.0/16"
          OTEL_EXPORTER_OTLP_ENDPOINT: http://172.20.0.1:4318
          OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf

      # ── TraceGuard ──────────────────────────────────────────────────────────
      # Analyses the traces emitted during test-e2e-api and diffs them against
      # the base branch. Only runs for internal PRs on grafana/tempo because
      # repository secrets are not available to fork-triggered workflows.

      - name: Build traceguard-analyze
        run: go build -o bin/traceguard-analyze ./cmd/traceguard-analyze

      - name: Compute base commit
        id: base-commit
        run: |
          git fetch origin "$BASE_REF" --depth=50 2>/dev/null || true
          BASE_SHA=$(git merge-base HEAD "origin/$BASE_REF" 2>/dev/null || echo "")
          echo "sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "Base commit: ${BASE_SHA:-<none found>}"
        env:
          BASE_REF: ${{ github.base_ref }}

      - name: Wait for trace ingestion
        run: sleep 30

      - name: Run TraceGuard analysis
        id: traceguard
        continue-on-error: true
        run: ./bin/traceguard-analyze 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
        env:
          MODE: remote
          GRAFANA_TEMPO_QUERY_URL: ${{ secrets.GRAFANA_TEMPO_QUERY_URL }}
          GRAFANA_BASIC_AUTH: ${{ secrets.GRAFANA_BASIC_AUTH }}
          GIT_COMMIT: ${{ github.sha }}
          BASE_COMMIT: ${{ steps.base-commit.outputs.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          MIN_SAMPLES: "10"

      - name: Report TraceGuard outcome
        if: always()
        run: |
          if [ "$OUTCOME" = "success" ]; then
            echo "TraceGuard analysis completed successfully."
          else
            echo "TraceGuard analysis encountered an error (non-blocking)."
          fi
        env:
          OUTCOME: ${{ steps.traceguard.outcome }}